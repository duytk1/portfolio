# One deploy path: push to main/master → build with Vite → publish dist/ to GitHub Pages.
# Repo Settings → Pages → Source must be "GitHub Actions" (not "Deploy from a branch").
# See README "Deploy to GitHub Pages".

name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Ensure production index.html (not dev /src/main.js)
        run: |
          if grep -q 'src/main.js' dist/index.html; then
            echo "::error::dist/index.html still references /src/main.js"
            cat dist/index.html
            exit 1
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
